<div class="row d-flex align-items-center justify-content-center" style="height: 100vh">
  <div class="col-xl-3 col-lg-4 col-md-6">
    <div class="card">
      <div class="card-header">
        <h3>Sign In</h3>
        <p>Please fill your information to sign in</p>
      </div>
      <div class="card-body">
        <form formValidate #loginForm="ngForm" autocomplete="off">
          <div class="form-group">
            <label>Username or Email</label>
            <input
              type="text"
              class="form-control"
              [(ngModel)]="login.userNameOrEmail"
              name="userNameOrEmail"
              required
            />
          </div>
          <div class="form-group mt-2">
            <label>Password</label>
            <input
              type="password"
              class="form-control"
              [(ngModel)]="login.password"
              name="password"
              required
            />
          </div>
          <div class="form-group mt-2">
            <button class="btn btn-dark w-100"><i class="fa-solid fa-lock me-1"></i>Sign In</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
