<div class="mt-3 d-flex justify-content-between align-items-center">
  <h3>Patient's Page</h3>
  <nav aria-label="breadcrumb">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a routerLink="/">Home</a></li>
      <li class="breadcrumb-item active" aria-current="page">Patient</li>
    </ol>
  </nav>
</div>

<div class="mt-3">
  <div class="form-group">
    <div class="row">
      <div class="col-xl-9 col-lg-8 col-md-6 col-sm-12 col-12">
        <button class="btn btn-dark" data-bs-toggle="modal" data-bs-target="#addModal">
          <i class="fa-solid fa-plus me-2"></i>Add Patient
        </button>
      </div>
      <div class="col-xl-3 col-lg-4 col-md-6 col-sm-12 col-12">
        <input
          type="search"
          class="form-control"
          [(ngModel)]="search"
          placeholder="Search Patient..."
        />
      </div>
    </div>
  </div>
  <div class="form-group mt-3">
    <table class="table table-hover">
      <thead>
        <tr>
          <th>#</th>
          <th>Full Name</th>
          <th>City / Town</th>
          <th>Full Address</th>
          <th>Oparations</th>
        </tr>
      </thead>
      <tbody>
        @for (item of patients | patient: search; track item) {
          <tr>
            <td>{{ $index + 1 }}</td>
            <td>{{ item.fullName }}</td>
            <td>{{ item.city }} / {{ item.town }}</td>
            <td>{{ item.fullAddress }}</td>
            <td>
              <button
                (click)="get(item)"
                data-bs-toggle="modal"
                data-bs-target="#updateModal"
                class="btn btn-sm btn-outline-primary me-2"
                title="update"
              >
                <i class="fa-solid fa-edit"></i>
              </button>
              <button
                (click)="delete(item.id)"
                class="btn btn-sm btn-outline-danger"
                title="delete"
              >
                <i class="fa-solid fa-trash"></i>
              </button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>

<div class="modal fade" id="addModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5">Add Patient</h1>
        <button
          type="button"
          #addPatientModalCloseBtn
          class="btn-close"
          data-bs-dismiss="modal"
          aria-label="Close"
        ></button>
      </div>
      <form #addForm="ngForm" formValidate autocomplete="off" (ngSubmit)="add(addForm)">
        <div class="modal-body">
          <div class="form-group">
            <label>First Name</label>
            <input
              type="text"
              [(ngModel)]="createModel.firstName"
              name="firstName"
              class="form-control"
              required
            />
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input
              type="text"
              [(ngModel)]="createModel.lastName"
              name="lastName"
              class="form-control"
              required
            />
          </div>
          <div class="form-group">
            <label>Identity Number</label>
            <input
              type="text"
              minlength="11"
              maxlength="11"
              [(ngModel)]="createModel.identityNumber"
              name="identityNumber"
              class="form-control"
              required
            />
          </div>
          <div class="form-group">
            <label>City</label>
            <input
              type="text"
              [(ngModel)]="createModel.city"
              name="city"
              class="form-control"
              required
            />
          </div>
          <div class="form-group">
            <label>Town</label>
            <input
              type="text"
              [(ngModel)]="createModel.town"
              name="town"
              class="form-control"
              required
            />
          </div>
          <div class="form-group">
            <label>Full Address</label>
            <input
              type="text"
              [(ngModel)]="createModel.fullAddress"
              name="fullAddress"
              class="form-control"
              required
            />
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          <button type="submit" class="btn btn-dark w-100">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>

<div class="modal fade" id="updateModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5">Update Patient</h1>
        <button
          type="button"
          #updatePatientModalCloseBtn
          class="btn-close"
          data-bs-dismiss="modal"
          aria-label="Close"
        ></button>
      </div>
      <form #updateForm="ngForm" formValidate autocomplete="off" (ngSubmit)="update(updateForm)">
        <div class="modal-body">
          <div class="form-group">
            <label>First Name</label>
            <input
              type="text"
              [(ngModel)]="updateModel.firstName"
              name="updateFirstName"
              class="form-control"
              required
            />
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input
              type="text"
              [(ngModel)]="updateModel.lastName"
              name="updateLastName"
              class="form-control"
              required
            />
          </div>
          <div class="form-group">
            <label>Identity Number</label>
            <input
              type="text"
              minlength="11"
              maxlength="11"
              [(ngModel)]="updateModel.identityNumber"
              name="updateIdentityNumber"
              class="form-control"
              required
            />
          </div>
          <div class="form-group">
            <label>City</label>
            <input
              type="text"
              [(ngModel)]="updateModel.city"
              name="updateCity"
              class="form-control"
              required
            />
          </div>
          <div class="form-group">
            <label>Town</label>
            <input
              type="text"
              [(ngModel)]="updateModel.town"
              name="updateTown"
              class="form-control"
              required
            />
          </div>
          <div class="form-group">
            <label>Full Address</label>
            <input
              type="text"
              [(ngModel)]="updateModel.fullAddress"
              name="updateFullAddress"
              class="form-control"
              required
            />
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          <button type="submit" class="btn btn-dark w-100">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>
