<div class="mt-3 d-flex justify-content-between align-items-center">
  <h3>e-Appointment</h3>
</div>

<div class="mt-2">
  <div class="row">
    <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6 col-12 mt-1">
      <label>Department</label>
      <select
        (change)="getAllDoctor()"
        name="department"
        [(ngModel)]="selectedDepartmentValue"
        class="form-control"
      >
        <option [value]="0">Select...</option>
        @for (department of departments; track department) {
          <option [value]="department.value">{{ department.name }}</option>
        }
      </select>
    </div>
    @if (selectedDepartmentValue > 0) {
      <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6 col-12 mt-1">
        <label>Doctor</label>
        <select
          (change)="GetAllAppointments()"
          name="doctor"
          [(ngModel)]="selectedDoctorId"
          class="form-control"
        >
          <option [value]="0">Select...</option>
          @for (doctor of doctors; track doctors) {
            <option [value]="doctor.id">{{ doctor.fullName }}</option>
          }
        </select>
      </div>
    }
  </div>
  @if (selectedDoctorId) {
    <div class="mt-2">
      <dx-scheduler
        [dataSource]="appointments"
        currentView="week"
        [startDayHour]="9"
        [endDayHour]="18"
        [showAllDayPanel]="false"
        textExpr="title"
        (onAppointmentFormOpening)="onAppointmentFormOpening($event)"
      ></dx-scheduler>
    </div>
  }
</div>

<div class="modal fade" id="addModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5">Create Appointment Form</h1>
        <button
          type="button"
          #addModalCloseBtn
          class="btn-close"
          data-bs-dismiss="modal"
          aria-label="Close"
        ></button>
      </div>
      <form #addForm="ngForm" formValidate autocomplete="off" (ngSubmit)="create(addForm)">
        <div class="modal-body">
          <div class="form-group">
            <span>{{ createModel.startDate }} - {{ createModel.endDate }}</span>
          </div>
          <div class="form-group">
            <label>Identity Number</label>
            <input
              type="text"
              minlength="11"
              maxlength="11"
              [(ngModel)]="createModel.identityNumber"
              name="identityNumber"
              class="form-control"
              required
              (change)="getPatient()"
            />
          </div>
          <div class="form-group">
            <label>First Name</label>
            <input
              type="text"
              [(ngModel)]="createModel.firstName"
              name="firstName"
              class="form-control"
              required
            />
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input
              type="text"
              [(ngModel)]="createModel.lastName"
              name="lastName"
              class="form-control"
              required
            />
          </div>

          <div class="form-group">
            <label>City</label>
            <input
              type="text"
              [(ngModel)]="createModel.city"
              name="city"
              class="form-control"
              required
            />
          </div>
          <div class="form-group">
            <label>Town</label>
            <input
              type="text"
              [(ngModel)]="createModel.town"
              name="town"
              class="form-control"
              required
            />
          </div>
          <div class="form-group">
            <label>Full Address</label>
            <input
              type="text"
              [(ngModel)]="createModel.fullAddress"
              name="fullAddress"
              class="form-control"
              required
            />
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          <button type="submit" class="btn btn-dark w-100">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>
